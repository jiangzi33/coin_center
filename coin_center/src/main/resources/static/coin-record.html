<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Issuance Records</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f6a623 0%, #d64545 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 760px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 24px; font-weight: 700; }
        .header .user { font-size: 14px; opacity: 0.9; }
        .header .user a {
            color: #fff;
            margin-left: 12px;
            text-decoration: underline;
            cursor: pointer;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 32px;
            margin-bottom: 20px;
        }
        h2 { font-size: 18px; color: #2d3748; margin-bottom: 16px; }
        .filters {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            align-items: end;
        }
        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 11px 14px;
            font-size: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f7fafc;
            transition: border-color 0.15s, background 0.15s;
        }
        input:focus { outline: none; border-color: #d64545; background: #fff; }
        button {
            padding: 11px 22px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #f6a623 0%, #d64545 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.15s;
        }
        button:hover { transform: translateY(-1px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .alert {
            padding: 11px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }
        .alert.error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
        .alert.info { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
        .list { margin-top: 20px; }
        .list-item {
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: border-color 0.15s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .list-item:hover { border-color: #d64545; transform: translateY(-1px); }
        .list-item-title { font-size: 15px; font-weight: 600; color: #2d3748; margin-bottom: 2px; }
        .list-item-meta { font-size: 12px; color: #718096; }
        .list-item-body { flex: 1; min-width: 0; }
        .list-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .list-item-thumb {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            background: linear-gradient(135deg, #f6a623 0%, #d64545 100%);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 24px;
        }
        .amount { font-weight: 700; color: #d64545; }
        .pager {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
        }
        .pager .info { font-size: 13px; color: #718096; }
        .pager .nav { display: flex; gap: 8px; }
        .pager button { padding: 8px 16px; font-size: 13px; }
        .empty { text-align: center; color: #a0aec0; font-size: 14px; padding: 24px 0; }
        .btn-icon {
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        .btn-icon.delete { color: #c53030; }
        .btn-icon.delete:hover { background: #fff5f5; border-color: #fc8181; }
        .btn-icon:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Coin Issuance Records</h1>
        <div class="user">
            <a id="musicHomeBtn">Music Home</a>
            <a id="prizeBtn">Prize Management</a>
        </div>
    </div>

    <div class="card">
        <h2>Filter by issue time</h2>
        <form id="filterForm">
            <div class="filters">
                <div class="field">
                    <label for="startTime">From</label>
                    <input type="datetime-local" id="startTime">
                </div>
                <div class="field">
                    <label for="endTime">To</label>
                    <input type="datetime-local" id="endTime">
                </div>
                <button type="submit" id="searchBtn">Search</button>
            </div>
        </form>

        <div id="alert" class="alert"></div>

        <div id="list" class="list"></div>
        <div id="pager" class="pager" style="display:none;">
            <div class="info" id="pagerInfo"></div>
            <div class="nav">
                <button type="button" id="prevBtn">Prev</button>
                <button type="button" id="nextBtn">Next</button>
            </div>
        </div>
    </div>
</div>

<script>
    const PAGE_SIZE = 5;
    const filterForm = document.getElementById('filterForm');
    const searchBtn = document.getElementById('searchBtn');
    const startInput = document.getElementById('startTime');
    const endInput = document.getElementById('endTime');
    const alertBox = document.getElementById('alert');
    const listBox = document.getElementById('list');
    const pagerBox = document.getElementById('pager');
    const pagerInfo = document.getElementById('pagerInfo');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    let currentPage = 1;
    let lastPageHadFullSize = true;

    document.getElementById('musicHomeBtn').addEventListener('click', () => {
        window.location.href = 'http://' + window.location.hostname + ':8082/music.html';
    });

    document.getElementById('prizeBtn').addEventListener('click', () => {
        window.location.href = '/coin.html';
    });

    // Default range: the last 30 days up to now. The backend filters with
    // `prize_time BETWEEN startTime AND endTime`, so both bounds are required.
    (function initDefaultRange() {
        const now = new Date();
        const from = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
        endInput.value = toLocalInput(now);
        startInput.value = toLocalInput(from);
    })();

    // Format a Date as the value expected by <input type="datetime-local">
    // (yyyy-MM-ddTHH:mm) in local time.
    function toLocalInput(d) {
        const pad = n => String(n).padStart(2, '0');
        return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
            + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    // Convert an <input type="datetime-local"> value to the backend format
    // (yyyy-MM-dd HH:mm:ss) that CoinRecordController's @DateTimeFormat expects.
    function toBackendTime(inputValue, endOfMinute) {
        if (!inputValue) return '';
        const seconds = endOfMinute ? ':59' : ':00';
        return inputValue.replace('T', ' ') + seconds;
    }

    function showAlert(message, type) {
        alertBox.textContent = message;
        alertBox.className = 'alert ' + type;
        alertBox.style.display = 'block';
    }

    function formatDate(value) {
        if (!value) return '—';
        const d = new Date(value);
        if (isNaN(d.getTime())) return value;
        return d.toLocaleString('en-US', {
            year: 'numeric', month: 'short', day: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });
    }

    function hideList() {
        listBox.innerHTML = '';
        pagerBox.style.display = 'none';
    }

    function renderList(items) {
        listBox.innerHTML = '';
        if (!items || items.length === 0) {
            listBox.innerHTML = currentPage === 1
                ? '<div class="empty">No coin issuance records in this range.</div>'
                : '<div class="empty">No more records.</div>';
            return;
        }
        items.forEach(r => {
            const item = document.createElement('div');
            item.className = 'list-item';

            const thumb = document.createElement('div');
            thumb.className = 'list-item-thumb';
            thumb.textContent = '🪙';
            item.appendChild(thumb);

            const body = document.createElement('div');
            body.className = 'list-item-body';
            const title = document.createElement('div');
            title.className = 'list-item-title';
            title.textContent = (r.code || '(no code)') + ' · ';
            const amount = document.createElement('span');
            amount.className = 'amount';
            amount.textContent = '+' + (r.amount != null ? r.amount : 0) + ' coins';
            title.appendChild(amount);

            const meta = document.createElement('div');
            meta.className = 'list-item-meta';
            const parts = ['#' + r.id];
            if (r.outBizNo) parts.push('biz ' + r.outBizNo);
            parts.push('issued ' + formatDate(r.prizeTime));
            meta.textContent = parts.join(' · ');

            body.appendChild(title);
            body.appendChild(meta);

            const actions = document.createElement('div');
            actions.className = 'list-item-actions';
            const deleteBtn = document.createElement('button');
            deleteBtn.type = 'button';
            deleteBtn.className = 'btn-icon delete';
            deleteBtn.textContent = 'Delete';
            deleteBtn.addEventListener('click', () => deleteRecord(r, deleteBtn));
            actions.appendChild(deleteBtn);

            item.appendChild(body);
            item.appendChild(actions);
            listBox.appendChild(item);
        });
    }

    async function loadPage() {
        alertBox.style.display = 'none';
        const startTime = toBackendTime(startInput.value, false);
        const endTime = toBackendTime(endInput.value, true);
        if (!startTime || !endTime) {
            hideList();
            showAlert('Please choose both a start and end time.', 'error');
            return;
        }
        const start = (currentPage - 1) * PAGE_SIZE;
        const qs = 'start=' + start + '&pageSize=' + PAGE_SIZE
            + '&startTime=' + encodeURIComponent(startTime)
            + '&endTime=' + encodeURIComponent(endTime);
        try {
            const res = await fetch('/coin-record/queryTime?' + qs, { method: 'GET' });
            const data = await res.json();
            if (data.baseVO && data.baseVO.code === 200 && data.baseVO.success) {
                const items = data.coinRecordVOList || [];
                lastPageHadFullSize = items.length === PAGE_SIZE;
                renderList(items);
                pagerBox.style.display = 'flex';
                pagerInfo.textContent = 'Page ' + currentPage;
                prevBtn.disabled = currentPage === 1;
                nextBtn.disabled = !lastPageHadFullSize;
            } else {
                hideList();
                showAlert((data.baseVO && data.baseVO.errorCode) || 'Failed to load records.', 'error');
            }
        } catch (err) {
            hideList();
            showAlert('Network error. Please try again.', 'error');
        }
    }

    prevBtn.addEventListener('click', () => {
        if (currentPage > 1) { currentPage--; loadPage(); }
    });
    nextBtn.addEventListener('click', () => {
        if (lastPageHadFullSize) { currentPage++; loadPage(); }
    });

    filterForm.addEventListener('submit', (e) => {
        e.preventDefault();
        currentPage = 1;
        loadPage();
    });

    // ---- Delete record (DELETE /coin-record/delete?id=) ----
    async function deleteRecord(record, btn) {
        if (record.id == null) {
            showAlert('Cannot delete: missing ID.', 'error');
            return;
        }
        if (!confirm('Delete record #' + record.id + '? This cannot be undone.')) return;

        btn.disabled = true;
        const originalText = btn.textContent;
        btn.textContent = '...';
        try {
            const res = await fetch('/coin-record/delete?id=' + encodeURIComponent(record.id), { method: 'DELETE' });
            const data = await res.json();
            if (data.code === 200 && data.success) {
                loadPage();
            } else {
                showAlert(data.errorCode || 'Failed to delete.', 'error');
                btn.disabled = false;
                btn.textContent = originalText;
            }
        } catch (err) {
            showAlert('Network error. Please try again.', 'error');
            btn.disabled = false;
            btn.textContent = originalText;
        }
    }

    loadPage();
</script>
</body>
</html>
