<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prize Management</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f6a623 0%, #d64545 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 760px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 24px; font-weight: 700; }
        .header .user { font-size: 14px; opacity: 0.9; }
        .header .user a {
            color: #fff;
            margin-left: 12px;
            text-decoration: underline;
            cursor: pointer;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 32px;
            margin-bottom: 20px;
        }
        h2 { font-size: 18px; color: #2d3748; margin-bottom: 16px; }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        .tab {
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            color: #718096;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        .tab.active { color: #d64545; border-bottom-color: #d64545; }
        .search-row { display: flex; gap: 10px; }
        input, select {
            flex: 1;
            padding: 11px 14px;
            font-size: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f7fafc;
            transition: border-color 0.15s, background 0.15s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #d64545;
            background: #fff;
        }
        button {
            padding: 11px 22px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #f6a623 0%, #d64545 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.15s;
        }
        button:hover { transform: translateY(-1px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .alert {
            padding: 11px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }
        .alert.error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
        .alert.info { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
        .list { margin-top: 20px; }
        .list-item {
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: border-color 0.15s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .list-item:hover { border-color: #d64545; transform: translateY(-1px); }
        .list-item-title { font-size: 15px; font-weight: 600; color: #2d3748; margin-bottom: 2px; }
        .list-item-meta { font-size: 12px; color: #718096; }
        .list-item-body { flex: 1; min-width: 0; }
        .list-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .list-item-thumb {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            background: linear-gradient(135deg, #f6a623 0%, #d64545 100%);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 24px;
        }
        .pager {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
        }
        .pager .info { font-size: 13px; color: #718096; }
        .pager .nav { display: flex; gap: 8px; }
        .pager button { padding: 8px 16px; font-size: 13px; }
        .empty { text-align: center; color: #a0aec0; font-size: 14px; padding: 24px 0; }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .btn-secondary {
            padding: 9px 18px;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.15s;
        }
        .btn-secondary:hover { transform: translateY(-1px); }
        .btn-icon {
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        .btn-icon.edit { color: #d64545; }
        .btn-icon.edit:hover { background: #fff5f5; border-color: #d64545; }
        .btn-icon.delete { color: #c53030; }
        .btn-icon.delete:hover { background: #fff5f5; border-color: #fc8181; }
        .btn-icon:disabled { opacity: 0.5; cursor: not-allowed; }
        .price { font-weight: 700; color: #d64545; }
        .stock-badge {
            display: inline-block;
            padding: 3px 10px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 12px;
        }
        .stock-badge.ok { color: #276749; background: #c6f6d5; }
        .stock-badge.low { color: #975a16; background: #fefcbf; }
        .stock-badge.out { color: #c53030; background: #fed7d7; }
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 100;
        }
        .modal-backdrop.open { display: flex; }
        .modal {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.25);
            padding: 28px;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        .modal-header h3 { font-size: 18px; color: #2d3748; }
        .modal-close {
            background: transparent;
            border: none;
            color: #a0aec0;
            font-size: 22px;
            cursor: pointer;
            padding: 0 4px;
        }
        .modal-close:hover { color: #2d3748; transform: none; }
        .modal .field { margin-bottom: 14px; }
        .modal label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
        }
        .modal input {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f7fafc;
            font-family: inherit;
        }
        .modal input:focus { outline: none; border-color: #d64545; background: #fff; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
        .btn-cancel {
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            background: #edf2f7;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-cancel:hover { background: #e2e8f0; transform: none; }
        .input-readonly { background: #edf2f7 !important; color: #718096; cursor: not-allowed; }
        .hint { font-size: 11px; color: #a0aec0; margin-top: 4px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Prize Management</h1>
        <div class="user">
            <span id="serverInfo"></span>
        </div>
    </div>

    <div class="card">
        <div class="toolbar">
            <h2 style="margin-bottom:0;">Manage prizes</h2>
            <button type="button" class="btn-secondary" id="openAddBtn">+ Add Prize</button>
        </div>

        <div class="tabs">
            <div class="tab active" data-mode="code">By Code</div>
            <div class="tab" data-mode="id">By ID</div>
        </div>

        <form id="searchForm">
            <div class="search-row">
                <input type="text" id="query" placeholder="Enter a prize code (leave blank to browse all)">
                <button type="submit" id="searchBtn">Search</button>
            </div>
        </form>

        <div id="alert" class="alert"></div>

        <div id="list" class="list"></div>
        <div id="pager" class="pager" style="display:none;">
            <div class="info" id="pagerInfo"></div>
            <div class="nav">
                <button type="button" id="prevBtn">Prev</button>
                <button type="button" id="nextBtn">Next</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-backdrop" id="addModal">
    <div class="modal">
        <div class="modal-header">
            <h3>Add a new prize</h3>
            <button type="button" class="modal-close" id="closeAddBtn" aria-label="Close">&times;</button>
        </div>
        <div id="addAlert" class="alert" style="margin-top:0;"></div>
        <form id="addForm" novalidate>
            <div class="field">
                <label for="addCode">Prize code</label>
                <input type="text" id="addCode" required maxlength="100" placeholder="e.g. GIFT-001">
            </div>
            <div class="field">
                <label for="addPrice">Price (coins)</label>
                <input type="number" id="addPrice" min="0" step="1" required>
            </div>
            <div class="field">
                <label for="addStore">Stock</label>
                <input type="number" id="addStore" min="0" step="1" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" id="cancelAddBtn">Cancel</button>
                <button type="submit" id="submitAddBtn">Create prize</button>
            </div>
        </form>
    </div>
</div>

<div class="modal-backdrop" id="editModal">
    <div class="modal">
        <div class="modal-header">
            <h3>Edit prize</h3>
            <button type="button" class="modal-close" id="closeEditBtn" aria-label="Close">&times;</button>
        </div>
        <div id="editAlert" class="alert" style="margin-top:0;"></div>
        <form id="editForm" novalidate>
            <div class="field">
                <label for="editId">ID</label>
                <input type="text" id="editId" class="input-readonly" readonly>
                <div class="hint">ID is the primary key and cannot be changed.</div>
            </div>
            <div class="field">
                <label for="editCode">Prize code</label>
                <input type="text" id="editCode" maxlength="100">
            </div>
            <div class="field">
                <label for="editPrice">Price (coins)</label>
                <input type="number" id="editPrice" min="0" step="1">
            </div>
            <div class="field">
                <label for="editStore">Stock</label>
                <input type="number" id="editStore" min="0" step="1">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" id="cancelEditBtn">Cancel</button>
                <button type="submit" id="submitEditBtn">Save changes</button>
            </div>
        </form>
    </div>
</div>

<script>
    const PAGE_SIZE = 5;
    const tabs = document.querySelectorAll('.tab');
    const queryInput = document.getElementById('query');
    const searchForm = document.getElementById('searchForm');
    const searchBtn = document.getElementById('searchBtn');
    const alertBox = document.getElementById('alert');
    const listBox = document.getElementById('list');
    const pagerBox = document.getElementById('pager');
    const pagerInfo = document.getElementById('pagerInfo');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    let currentPage = 1;
    let lastPageHadFullSize = true;
    let mode = 'code';

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            mode = tab.dataset.mode;
            queryInput.value = '';
            queryInput.placeholder = mode === 'code'
                ? 'Enter a prize code (leave blank to browse all)'
                : 'Enter a prize ID (leave blank to browse all)';
            queryInput.type = mode === 'id' ? 'number' : 'text';
            alertBox.style.display = 'none';
            currentPage = 1;
            loadPage();
        });
    });

    function showAlert(message, type) {
        alertBox.textContent = message;
        alertBox.className = 'alert ' + type;
        alertBox.style.display = 'block';
    }

    function formatDate(value) {
        if (!value) return '—';
        const d = new Date(value);
        if (isNaN(d.getTime())) return value;
        return d.toLocaleString('en-US', {
            year: 'numeric', month: 'short', day: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });
    }

    function stockBadge(store) {
        const n = store == null ? 0 : store;
        let cls = 'ok', label = 'Stock ' + n;
        if (n <= 0) { cls = 'out'; label = 'Out of stock'; }
        else if (n <= 10) { cls = 'low'; }
        return '<span class="stock-badge ' + cls + '">' + label + '</span>';
    }

    function hideList() {
        listBox.innerHTML = '';
        pagerBox.style.display = 'none';
    }

    function renderList(items) {
        listBox.innerHTML = '';
        if (!items || items.length === 0) {
            listBox.innerHTML = currentPage === 1
                ? '<div class="empty">No prizes available.</div>'
                : '<div class="empty">No more prizes.</div>';
            return;
        }
        items.forEach(c => {
            const item = document.createElement('div');
            item.className = 'list-item';

            const thumb = document.createElement('div');
            thumb.className = 'list-item-thumb';
            thumb.textContent = '🎁';
            item.appendChild(thumb);

            const body = document.createElement('div');
            body.className = 'list-item-body';
            const title = document.createElement('div');
            title.className = 'list-item-title';
            title.textContent = c.code || '(no code)';
            const meta = document.createElement('div');
            meta.className = 'list-item-meta';
            meta.innerHTML =
                '#' + c.id + ' · <span class="price">' + (c.price != null ? c.price : '—') + ' coins</span> · '
                + stockBadge(c.store)
                + (c.lastOperationTime ? ' · updated ' + formatDate(c.lastOperationTime) : '');
            body.appendChild(title);
            body.appendChild(meta);

            const actions = document.createElement('div');
            actions.className = 'list-item-actions';

            const editBtn = document.createElement('button');
            editBtn.type = 'button';
            editBtn.className = 'btn-icon edit';
            editBtn.textContent = 'Edit';
            editBtn.addEventListener('click', () => openEditModal(c));

            const deleteBtn = document.createElement('button');
            deleteBtn.type = 'button';
            deleteBtn.className = 'btn-icon delete';
            deleteBtn.textContent = 'Delete';
            deleteBtn.addEventListener('click', () => deletePrize(c, deleteBtn));

            actions.appendChild(editBtn);
            actions.appendChild(deleteBtn);

            item.appendChild(body);
            item.appendChild(actions);
            listBox.appendChild(item);
        });
    }

    async function loadPage() {
        alertBox.style.display = 'none';
        const start = (currentPage - 1) * PAGE_SIZE;
        try {
            const res = await fetch('/coin/queryAll?start=' + start + '&pageSize=' + PAGE_SIZE, { method: 'GET' });
            const data = await res.json();
            if (data.baseVO && data.baseVO.code === 200 && data.baseVO.success) {
                const items = data.coinVOList || [];
                lastPageHadFullSize = items.length === PAGE_SIZE;
                renderList(items);
                pagerBox.style.display = 'flex';
                pagerInfo.textContent = 'Page ' + currentPage;
                prevBtn.disabled = currentPage === 1;
                nextBtn.disabled = !lastPageHadFullSize;
            } else {
                hideList();
                showAlert((data.baseVO && data.baseVO.errorCode) || 'Failed to load prizes.', 'error');
            }
        } catch (err) {
            hideList();
            showAlert('Network error. Please try again.', 'error');
        }
    }

    prevBtn.addEventListener('click', () => {
        if (currentPage > 1) { currentPage--; loadPage(); }
    });
    nextBtn.addEventListener('click', () => {
        if (lastPageHadFullSize) { currentPage++; loadPage(); }
    });

    async function runSearch(value) {
        alertBox.style.display = 'none';
        const endpoint = mode === 'id'
            ? '/coin/queryId?id=' + encodeURIComponent(value)
            : '/coin/queryCode?code=' + encodeURIComponent(value);

        searchBtn.disabled = true;
        searchBtn.textContent = 'Searching...';
        try {
            const res = await fetch(endpoint, { method: 'GET' });
            const data = await res.json();
            if (data.baseVO && data.baseVO.code === 200 && data.baseVO.success && data.coinVO) {
                pagerBox.style.display = 'none';
                renderList([data.coinVO]);
            } else {
                hideList();
                showAlert((data.baseVO && data.baseVO.errorCode) || 'No matching prize found.', 'error');
            }
        } catch (err) {
            showAlert('Network error. Please try again.', 'error');
        } finally {
            searchBtn.disabled = false;
            searchBtn.textContent = 'Search';
        }
    }

    searchForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const value = queryInput.value.trim();
        if (!value) { currentPage = 1; loadPage(); return; }
        runSearch(value);
    });

    // ---- Delete prize (DELETE /coin/delete?id=) ----
    async function deletePrize(coin, btn) {
        if (coin.id == null) {
            showAlert('Cannot delete: missing ID.', 'error');
            return;
        }
        const label = coin.code ? '"' + coin.code + '"' : 'this prize';
        if (!confirm('Delete ' + label + '? This cannot be undone.')) return;

        btn.disabled = true;
        const originalText = btn.textContent;
        btn.textContent = '...';
        try {
            const res = await fetch('/coin/delete?id=' + encodeURIComponent(coin.id), { method: 'DELETE' });
            const data = await res.json();
            if (data.code === 200 && data.success) {
                loadPage();
            } else {
                showAlert(data.errorCode || 'Failed to delete.', 'error');
                btn.disabled = false;
                btn.textContent = originalText;
            }
        } catch (err) {
            showAlert('Network error. Please try again.', 'error');
            btn.disabled = false;
            btn.textContent = originalText;
        }
    }

    // ---- Add prize modal (POST /coin/add, JSON body) ----
    const addModal = document.getElementById('addModal');
    const addForm = document.getElementById('addForm');
    const addAlert = document.getElementById('addAlert');
    const submitAddBtn = document.getElementById('submitAddBtn');

    function showAddAlert(message, type) {
        addAlert.textContent = message;
        addAlert.className = 'alert ' + type;
        addAlert.style.display = 'block';
    }
    function openAddModal() {
        addForm.reset();
        addAlert.style.display = 'none';
        addModal.classList.add('open');
        document.getElementById('addCode').focus();
    }
    function closeAddModal() { addModal.classList.remove('open'); }

    document.getElementById('openAddBtn').addEventListener('click', openAddModal);
    document.getElementById('closeAddBtn').addEventListener('click', closeAddModal);
    document.getElementById('cancelAddBtn').addEventListener('click', closeAddModal);
    addModal.addEventListener('click', (e) => { if (e.target === addModal) closeAddModal(); });

    addForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        addAlert.style.display = 'none';
        const payload = {
            code: document.getElementById('addCode').value.trim(),
            price: parseInt(document.getElementById('addPrice').value, 10) || 0,
            store: parseInt(document.getElementById('addStore').value, 10) || 0
        };
        if (!payload.code) { showAddAlert('Prize code is required.', 'error'); return; }

        submitAddBtn.disabled = true;
        submitAddBtn.textContent = 'Creating...';
        try {
            const res = await fetch('/coin/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (data.code === 200 && data.success) {
                showAddAlert('Prize created!', 'info');
                setTimeout(() => {
                    closeAddModal();
                    currentPage = 1;
                    queryInput.value = '';
                    loadPage();
                }, 600);
            } else {
                showAddAlert(data.errorCode || 'Failed to create prize.', 'error');
            }
        } catch (err) {
            showAddAlert('Network error. Please try again.', 'error');
        } finally {
            submitAddBtn.disabled = false;
            submitAddBtn.textContent = 'Create prize';
        }
    });

    // ---- Edit prize modal (PUT /coin/modify, query params) ----
    const editModal = document.getElementById('editModal');
    const editForm = document.getElementById('editForm');
    const editAlert = document.getElementById('editAlert');
    const submitEditBtn = document.getElementById('submitEditBtn');
    const editIdInput = document.getElementById('editId');
    const editCodeInput = document.getElementById('editCode');
    const editPriceInput = document.getElementById('editPrice');
    const editStoreInput = document.getElementById('editStore');
    let editCoinId = null;

    function showEditAlert(message, type) {
        editAlert.textContent = message;
        editAlert.className = 'alert ' + type;
        editAlert.style.display = 'block';
    }
    function openEditModal(coin) {
        editAlert.style.display = 'none';
        editCoinId = coin.id;
        editIdInput.value = coin.id;
        editCodeInput.value = coin.code || '';
        editPriceInput.value = coin.price != null ? coin.price : '';
        editStoreInput.value = coin.store != null ? coin.store : '';
        editModal.classList.add('open');
        editCodeInput.focus();
    }
    function closeEditModal() { editModal.classList.remove('open'); }

    document.getElementById('closeEditBtn').addEventListener('click', closeEditModal);
    document.getElementById('cancelEditBtn').addEventListener('click', closeEditModal);
    editModal.addEventListener('click', (e) => { if (e.target === editModal) closeEditModal(); });

    editForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        editAlert.style.display = 'none';
        const params = new URLSearchParams({
            id: editCoinId,
            code: editCodeInput.value.trim(),
            price: parseInt(editPriceInput.value, 10) || 0,
            store: parseInt(editStoreInput.value, 10) || 0
        });

        submitEditBtn.disabled = true;
        submitEditBtn.textContent = 'Saving...';
        try {
            const res = await fetch('/coin/modify?' + params.toString(), { method: 'PUT' });
            const data = await res.json();
            if (data.code === 200 && data.success) {
                showEditAlert('Saved!', 'info');
                setTimeout(() => { closeEditModal(); loadPage(); }, 500);
            } else {
                showEditAlert(data.errorCode || 'Failed to save changes.', 'error');
            }
        } catch (err) {
            showEditAlert('Network error. Please try again.', 'error');
        } finally {
            submitEditBtn.disabled = false;
            submitEditBtn.textContent = 'Save changes';
        }
    });

    loadPage();
</script>
</body>
</html>
